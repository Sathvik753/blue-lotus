version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       bluelotus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/bluelotus
      SECRET_KEY:   change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./engine:/app/engine
      - ./api:/app/api
      - ./db:/app/db
      - ./reports:/app/reports
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Streamlit Frontend ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
      - ./reports:/app/reports
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
